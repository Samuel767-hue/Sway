<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sway</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            margin: 0;
            background: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- PANTALLA DE LOGIN --- */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 25px;
        }
        #login-screen h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(45deg, #25f4ee, #fe2c55);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-card {
            background: #121212;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #262626;
            text-align: center;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .divider {
            color: #757575;
            font-size: 0.9rem;
            margin: 10px 0;
        }
        .guest-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        .guest-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #262626;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .guest-btn:hover { background: #333; }

        /* --- CABECERA --- */
        #header {
            display: none; /* Se oculta hasta hacer login */
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #1a1a1a;
            background: #000;
        }
        #header-user {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .logout-btn {
            background: transparent;
            color: #fe2c55;
            border: 1px solid #fe2c55;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
        }

        /* --- ÁREA DE CHAT --- */
        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: none;
            flex-direction: column;
        }

        /* ESTILO COMUNIDAD (Burbujas normales) */
        .msg-bubble {
            padding: 10px 15px;
            border-radius: 18px;
            margin: 5px 10px;
            max-width: 75%;
            word-wrap: break-word;
            font-size: 0.95rem;
        }
        .me { background: #fff; color: #000; margin-left: auto; border-bottom-right-radius: 4px; }
        .them { background: #262626; color: #fff; margin-right: auto; border-bottom-left-radius: 4px; }
        
        /* ESTILO PRIVADO (Bandeja de entrada TikTok) */
        .inbox-row {
            display: flex;
            align-items: center;
            padding: 12px 10px;
            gap: 15px;
            cursor: pointer;
        }
        .inbox-row:hover { background: #121212; border-radius: 8px; }
        .inbox-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fe2c55, #25f4ee);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #fff;
            flex-shrink: 0;
        }
        .inbox-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .inbox-name { font-weight: bold; font-size: 1rem; }
        .inbox-text { color: #888; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .system { color: #757575; text-align: center; font-size: 0.85rem; margin: 10px 0; }

        /* --- CONTROLES INFERIORES --- */
        #footer {
            display: none;
            background: #000;
            border-top: 1px solid #1a1a1a;
            padding: 10px 15px;
            flex-direction: column;
            gap: 10px;
        }
        #tabs {
            display: flex;
            justify-content: space-around;
            border-bottom: 1px solid #1a1a1a;
        }
        .tab {
            padding: 10px;
            color: #757575;
            font-weight: bold;
            cursor: pointer;
        }
        .tab.active {
            color: #fff;
            border-bottom: 2px solid #fff;
        }
        #input-row { display: flex; gap: 10px; }
        #msg-input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 20px;
            border: none;
            background: #262626;
            color: #fff;
            outline: none;
        }
        #send-btn {
            background: #fe2c55;
            color: #fff;
            border: none;
            padding: 0 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Sway</h1>
        <div class="login-card">
            
            <div id="g_id_onload" 
                 data-client_id="531379066398-v8r20953jk0hugfsjj1a9ij65nd3hqas.apps.googleusercontent.com" 
                 data-callback="handleGoogleLogin">
            </div>
            <div class="g_id_signin" data-type="standard" data-theme="filled_dark" data-size="large" data-width="240"></div>
            
            <div class="divider">o entra como invitado</div>
            
            <input type="text" id="guest-input" class="guest-input" placeholder="Tu nombre..." onkeydown="if(event.key === 'Enter') guestLogin()">
            <button class="guest-btn" onclick="guestLogin()">Entrar como Invitado</button>
        </div>
    </div>

    <div id="header">
        <div id="header-user">Usuario</div>
        <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </div>

    <div id="chat-area"></div>

    <div id="footer">
        <div id="tabs">
            <div class="tab active" id="tab-comunidad" onclick="switchTab('comunidad')">Comunidad</div>
            <div class="tab" id="tab-privado" onclick="switchTab('privado')">Privado 🔒</div>
        </div>
        <div id="input-row">
            <input type="text" id="msg-input" placeholder="Añadir comentario..." onkeydown="if(event.key === 'Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem("swayUsername");
        let currentTab = "comunidad";
        let ws;
        let allMessages = [];

        // Comprobar si ya hay sesión iniciada al cargar
        if (currentUser) {
            startApp(currentUser);
        }

        // 1. Manejo de Login con Google
        function handleGoogleLogin(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            startApp(payload.name);
        }

        // 2. Manejo de Login Invitado
        function guestLogin() {
            const name = document.getElementById("guest-input").value.trim();
            if (name) startApp(name);
        }

        // 3. Iniciar la App
        function startApp(username) {
            currentUser = username;
            localStorage.setItem("swayUsername", username);
            
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("header").style.display = "flex";
            document.getElementById("chat-area").style.display = "flex";
            document.getElementById("footer").style.display = "flex";
            document.getElementById("header-user").innerText = "👤 " + username;

            connectWebSocket();
        }

        // 4. Cerrar Sesión
        function logout() {
            localStorage.removeItem("swayUsername");
            if(ws) ws.close();
            location.reload(); // Recarga la página para volver al login
        }

        // 5. Conexión WebSocket
        function connectWebSocket() {
            ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws");
            
            ws.onopen = () => {
                ws.send(currentUser); // Enviar nombre al servidor
            };

            ws.onmessage = (e) => {
                allMessages.push(e.data);
                renderMessages();
            };
        }

        // 6. Cambiar de Pestaña
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById("tab-comunidad").classList.toggle("active", tab === "comunidad");
            document.getElementById("tab-privado").classList.toggle("active", tab === "privado");
            
            let input = document.getElementById("msg-input");
            input.placeholder = tab === "privado" ? "Escribe @usuario mensaje..." : "Añadir comentario...";
            
            renderMessages();
            input.focus();
        }

        // 7. Renderizar Mensajes según la pestaña
        function renderMessages() {
            const chatArea = document.getElementById("chat-area");
            chatArea.innerHTML = "";

            allMessages.forEach(msg => {
                const isSystem = msg.startsWith("SISTEMA:");
                const isPrivate = msg.startsWith("(Privado de");

                // Filtros de pestaña
                if (currentTab === "comunidad" && isPrivate) return;
                if (currentTab === "privado" && !isPrivate && !isSystem) return;

                if (isSystem) {
                    chatArea.innerHTML += `<div class="system">${msg}</div>`;
                    return;
                }

                if (currentTab === "comunidad") {
                    // Renderizado de burbujas normales para la comunidad
                    let isMe = msg.startsWith(currentUser + ": ");
                    let cssClass = isMe ? "me" : "them";
                    let displayText = isMe ? msg.replace(currentUser + ": ", "") : msg;
                    
                    chatArea.innerHTML += `<div class="msg-bubble ${cssClass}">${displayText}</div>`;
                } 
                else if (currentTab === "privado") {
                    // Renderizado ESTILO TIKTOK INBOX para privados
                    // Extraer quién lo envía y el texto. Formato: "(Privado de Sender): Mensaje"
                    let sender = msg.match(/\(Privado de (.*?)\):/);
                    if (sender && sender[1]) {
                        let senderName = sender[1];
                        let messageText = msg.split("): ")[1];
                        let initial = senderName.charAt(0).toUpperCase();

                        // Si el mensaje es tuyo, cambiamos ligeramente cómo se muestra
                        if(senderName === currentUser) {
                            senderName = "Tú (Enviado)";
                            initial = "T";
                        }

                        chatArea.innerHTML += `
                            <div class="inbox-row">
                                <div class="inbox-avatar">${initial}</div>
                                <div class="inbox-content">
                                    <div class="inbox-name">${senderName}</div>
                                    <div class="inbox-text">${messageText}</div>
                                </div>
                            </div>
                        `;
                    }
                }
            });

            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // 8. Enviar Mensaje
        function sendMessage() {
            let input = document.getElementById("msg-input");
            let text = input.value.trim();
            
            if (text) {
                if (currentTab === "privado" && !text.startsWith("@")) {
                    alert("Para mensajes privados usa: @usuario mensaje");
                    return;
                }
                ws.send(text);
                input.value = "";
            }
        }
    </script>
</body>
</html>
