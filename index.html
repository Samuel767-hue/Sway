<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sway</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body{margin:0;background:#000;color:#fff;font-family:sans-serif;height:100vh;display:flex;flex-direction:column}
        #top{padding:15px;text-align:center;font-weight:bold}
        #chat{flex:1;overflow-y:auto;padding:20px}
        .msg{padding:10px 15px;border-radius:15px;margin:8px;max-width:80%}
        .me{background:white;color:black;margin-left:auto}
        .them{background:#262626}
        #tabs{display:flex;background:#121212}
        .tab{flex:1;padding:15px;text-align:center;cursor:pointer}
        .active{border-bottom:2px solid #fe2c55}
        #bar{display:flex;padding:15px;gap:10px;background:#121212}
        input{flex:1;padding:12px;border-radius:20px;border:none}
        #login{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:10}
    </style>
</head>
<body>
    <div id="login">
        <h2>Sway</h2>
        <div id="g_id_onload" data-client_id="531379066398-v8r20953jk0hugfsjj1a9ij65nd3hqas.apps.googleusercontent.com" data-callback="handleLogin"></div>
        <div class="g_id_signin"></div>
        <input id="n" placeholder="Nombre inventado...">
        <button onclick="login()">Entrar</button>
    </div>

    <div id="top">👤 <span id="user"></span></div>
    <div id="chat"></div>
    <div id="tabs">
        <div class="tab active" onclick="setMode('comunidad')">Comunidad</div>
        <div class="tab" onclick="setMode('privado')">Privado 🔒</div>
    </div>
    <div id="bar">
        <input id="input">
        <button onclick="send()">Enviar</button>
    </div>

    <script>
        let mode = 'comunidad';
        let user = localStorage.getItem("swayUser");
        let ws = new WebSocket((location.protocol==="https:"?"wss://":"ws://")+location.host+"/ws");

        function handleLogin(res) {
            let p = JSON.parse(atob(res.credential.split('.')[1]));
            saveUser(p.name);
        }

        function login() { saveUser(document.getElementById('n').value); }

        function saveUser(name) {
            user = name;
            localStorage.setItem("swayUser", name);
            document.getElementById("user").innerText = name;
            document.getElementById("login").style.display = 'none';
            ws.send(name);
        }

        if(user) { document.getElementById("user").innerText = user; document.getElementById("login").style.display = 'none'; ws.onopen = () => ws.send(user); }

        ws.onmessage = e => {
            let data = e.data;
            let d = document.createElement("div");
            d.className = "msg " + (data.startsWith(user+": ") ? "me" : "them");
            d.innerText = data.replace(user+": ", "");
            document.getElementById("chat").appendChild(d);
        };

        function send() {
            let i = document.getElementById("input");
            ws.send((mode === 'privado' ? "@" : "") + i.value);
            i.value = "";
        }

        function setMode(m) { mode = m; document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText.toLowerCase().includes(m))); }
    </script>
</body>
</html>
