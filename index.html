<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sway</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #121212; border-bottom: 1px solid #262626; z-index: 40; }
        .top-controls { display: flex; align-items: center; gap: 15px; }
        .btn-logout { background: transparent; border: 1px solid #fe2c55; color: #fe2c55; padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 12px; font-weight: bold; }
        #bell-container { position: relative; cursor: pointer; font-size: 22px; user-select: none; }
        #bell-badge { position: absolute; top: -5px; right: -5px; background: #fe2c55; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; display: none; justify-content: center; align-items: center; font-weight: bold; }
        #notif-panel { position: absolute; top: 40px; right: 0px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; width: 260px; display: none; flex-direction: column; z-index: 50; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .notif-item { padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .btn-acc { background: #fe2c55; color: white; border: none; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-weight: bold; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 100; }
        #login-box { background: #121212; padding: 40px; border-radius: 20px; text-align: center; width: 80%; max-width: 320px; border: 1px solid #333; height: fit-content; }
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: #666; font-size: 12px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #333; }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }
        #chat-container { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 18px; border-radius: 18px; width: fit-content; max-width: 85%; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg-them { background: #262626; align-self: flex-start; border-bottom-left-radius: 5px; }
        .msg-me { background: #fff; color: #000; align-self: flex-end; border-bottom-right-radius: 5px; }
        .msg-sys { background: transparent; color: #888; align-self: center; font-size: 12px; font-style: italic; text-align: center; }
        #tabs { display: flex; background: #000; padding: 10px 20px 0 20px; gap: 15px; }
        .tab { background: #1a1a1a; color: #888; border: 1px solid #333; border-bottom: none; padding: 10px 20px; border-radius: 15px 15px 0 0; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .tab.active { background: #262626; color: #fff; border-color: #444; }
        #input-area { padding: 20px; background: #262626; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 14px; border-radius: 25px; border: none; background: #1a1a1a; color: white; outline: none; }
        button.btn-send { padding: 12px 25px; background: #fe2c55; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }

        .btn-add-friend { background: #fe2c55; color: #fff; border: none; padding: 12px; border-radius: 15px; width: 100%; margin-bottom: 15px; cursor: pointer; font-weight: bold; text-align: center; font-size: 14px; }
        .friend-item { display: flex; align-items: center; padding: 12px 10px; border-bottom: 1px solid #1a1a1a; cursor: pointer; border-radius: 10px; transition: background 0.2s; }
        .friend-item:hover { background: #121212; }
        .friend-avatar { width: 48px; height: 48px; border-radius: 50%; background: #262626; border: 2px solid #fe2c55; margin-right: 15px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; color: #fff; }
        .friend-info { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .friend-name { font-weight: bold; font-size: 15px; margin-bottom: 3px; color: #fff; }
        .friend-lastmsg { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .back-chat-bar { display: flex; align-items: center; padding: 10px 0; margin-bottom: 10px; color: #fe2c55; cursor: pointer; font-weight: bold; font-size: 14px; border-bottom: 1px solid #262626; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div id="login-box">
            <h2>Sway</h2>
            <div id="g_id_onload"
                 data-client_id="531379066398-v8r20953jk0hugfsjj1a9ij65nd3hqas.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleGoogleLogin"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="center" style="display: flex; justify-content: center; margin-bottom: 10px;"></div>
            <div class="divider">O entra como invitado</div>
            <input id="username" placeholder="Nombre inventado..." autocomplete="off">
            <br><br>
            <button class="btn-send" onclick="register()" style="width: 100%;">Entrar</button>
        </div>
    </div>

    <div id="top-bar">
        <h2 style="margin: 0; font-size: 20px;">Sway</h2>
        <div class="top-controls">
            <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
            <div id="bell-container" onclick="toggleNotifs()">🔔<div id="bell-badge">0</div>
                <div id="notif-panel">
                    <div style="padding: 10px; color: #888; font-size: 12px; text-align: center;" id="notif-empty">No hay notificaciones</div>
                    <div id="notif-list"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="chat-container"></div>

    <div id="tabs">
        <button id="tab-comunidad" class="tab active" onclick="switchTab('comunidad')">Comunidad</button>
        <button id="tab-privado" class="tab" onclick="switchTab('privado_list')">Privado 🔒</button>
    </div>

    <div id="input-area">
        <input id="input" type="text" placeholder="Mensaje a la comunidad..." autocomplete="off">
        <button class="btn-send" onclick="send()">Enviar</button>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === "https:" ? "wss://" : "ws://") + window.location.host + "/ws");
        let currentMode = "comunidad";
        let chatHistories = { "comunidad": [] };
        let pendingRequests = [];
        let friends = [];
        
        // Carga inmediata de datos desde el almacenamiento local
        function loadStorage() {
            const savedName = localStorage.getItem("swayUsername");
            chatHistories["comunidad"] = JSON.parse(localStorage.getItem("swayCommunityChats")) || [];
            if (savedName) {
                friends = JSON.parse(localStorage.getItem("swayFriends_" + savedName)) || [];
                const savedPriv = JSON.parse(localStorage.getItem("swayChats_" + savedName)) || {};
                Object.assign(chatHistories, savedPriv);
            }
        }

        window.onload = () => {
            loadStorage();
            const savedName = localStorage.getItem("swayUsername");
            if (savedName) {
                document.getElementById("login-screen").style.display = "none";
                ws.onopen = () => ws.send(savedName);
                switchTab("comunidad");
            }
        };

        function register() {
            const name = document.getElementById("username").value.trim();
            if (name) loginSuccess(name);
        }

        function logout() {
            saveChats();
            saveFriends();

            localStorage.removeItem("swayUsername");

            if (window.google && window.google.accounts) {
                google.accounts.id.disableAutoSelect();
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }

            document.getElementById("login-screen").style.display = "flex";
            currentMode = "comunidad";
            document.getElementById("chat-container").innerHTML = "";
        }

        function loginSuccess(name) {
            localStorage.setItem("swayUsername", name);
            loadStorage();
            ws.send(name);
            document.getElementById("login-screen").style.display = "none";
            switchTab("comunidad");
        }

        function saveChats() {
            const myName = localStorage.getItem("swayUsername");
            localStorage.setItem("swayCommunityChats", JSON.stringify(chatHistories["comunidad"]));
            if (myName) {
                const privateChats = { ...chatHistories };
                delete privateChats["comunidad"];
                localStorage.setItem("swayChats_" + myName, JSON.stringify(privateChats));
            }
        }

        function saveFriends() {
            const myName = localStorage.getItem("swayUsername");
            if (myName) localStorage.setItem("swayFriends_" + myName, JSON.stringify(friends));
        }

        function decodeJwtResponse(token) {
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) { return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2); }).join(''));
            return JSON.parse(jsonPayload);
        }

        function handleGoogleLogin(response) { loginSuccess(decodeJwtResponse(response.credential).name); }

        ws.onmessage = (event) => {
            const myName = localStorage.getItem("swayUsername");
            const msgData = event.data;
            const privMatch = msgData.match(/^\(Privado de (.*?)\): (.*)$/);
            if (privMatch) {
                const sender = privMatch[1]; const content = privMatch[2];
                if (content === "/SYS_REQ") { if (!pendingRequests.includes(sender)) { pendingRequests.push(sender); updateBell(); } return; }
                if (content === "/SYS_ACC") { if (!friends.includes(sender)) friends.push(sender); saveFriends(); addMessageToHistory(sender, "¡Ahora sois amigos!", "sys"); saveChats(); render(); return; }
                if (!friends.includes(sender)) { friends.push(sender); saveFriends(); }
                addMessageToHistory(sender, content, "them"); saveChats(); render();
                return;
            }
            let sender = "them"; let text = msgData;
            if (msgData.startsWith(myName + ": ")) { sender = "me"; text = msgData.replace(myName + ": ", ""); }
            addMessageToHistory("comunidad", text, sender); saveChats(); render();
        };

        function addMessageToHistory(chatName, text, type) {
            if (!chatHistories[chatName]) chatHistories[chatName] = [];
            chatHistories[chatName].push({ text, type });
        }

        function render() {
            if (currentMode === "privado_list") renderFriendsList();
            else renderChat();
        }

        function renderChat() {
            const container = document.getElementById("chat-container");
            container.innerHTML = "";
            if (currentMode !== "comunidad" && currentMode !== "privado_list") {
                const backBar = document.createElement("div");
                backBar.className = "back-chat-bar"; backBar.innerText = "← Volver a Amigos";
                backBar.onclick = () => switchTab("privado_list");
                container.appendChild(backBar);
            }
            (chatHistories[currentMode] || []).forEach(msg => {
                const div = document.createElement("div"); div.className = "msg msg-" + msg.type; div.innerText = msg.text;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function renderFriendsList() {
            const container = document.getElementById("chat-container");
            container.innerHTML = `<button class="btn-add-friend" onclick="promptAddFriend()">+ Añadir amigo</button>`;
            friends.forEach(friend => {
                const item = document.createElement("div"); item.className = "friend-item"; item.onclick = () => switchTab(friend);
                const history = chatHistories[friend] || [];
                const lastMsg = history.length > 0 ? (history[history.length-1].type === "me" ? "Tú: " : "") + history[history.length-1].text : "Sin mensajes";
                item.innerHTML = `<div class="friend-avatar">${friend[0].toUpperCase()}</div><div class="friend-info"><div class="friend-name">${friend}</div><div class="friend-lastmsg">${lastMsg}</div></div>`;
                container.appendChild(item);
            });
        }

        function promptAddFriend() {
            const target = prompt("¿Con quién quieres hablar?");
            if (target) {
                if (!friends.includes(target)) { friends.push(target); saveFriends(); }
                ws.send("@" + target + " /SYS_REQ");
                switchTab(target);
            }
        }

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById("tab-comunidad").classList.toggle("active", mode === "comunidad");
            document.getElementById("tab-privado").classList.toggle("active", mode !== "comunidad");
            document.getElementById("input-area").style.display = (mode === "privado_list") ? "none" : "flex";
            render();
        }

        function updateBell() {
            const badge = document.getElementById("bell-badge");
            badge.innerText = pendingRequests.length;
            badge.style.display = pendingRequests.length > 0 ? "flex" : "none";
            const list = document.getElementById("notif-list");
            list.innerHTML = "";
            pendingRequests.forEach(req => {
                const item = document.createElement("div"); item.className = "notif-item";
                item.innerHTML = `<span>${req}</span> <button class="btn-acc" onclick="acceptRequest('${req}')">Aceptar</button>`;
                list.appendChild(item);
            });
        }

        function toggleNotifs() { document.getElementById("notif-panel").style.display = (document.getElementById("notif-panel").style.display === "flex" ? "none" : "flex"); }
        function acceptRequest(user) { pendingRequests = pendingRequests.filter(u => u !== user); updateBell(); toggleNotifs(); if (!friends.includes(user)) { friends.push(user); saveFriends(); } ws.send("@" + user + " /SYS_ACC"); switchTab(user); }
        function send() {
            const input = document.getElementById("input"); const text = input.value.trim();
            if (text !== "") { 
                if (currentMode === "comunidad") ws.send(text); 
                else { ws.send("@" + currentMode + " " + text); addMessageToHistory(currentMode, text, "me"); saveChats(); render(); } 
                input.value = ""; 
            }
        }
        document.getElementById("input").addEventListener("keypress", (e) => { if (e.key === "Enter") send(); });
    </script>
</body>
</html>
