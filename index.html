<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sway - Live</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Login */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 100; }
        #login-box { background: #121212; padding: 40px; border-radius: 20px; text-align: center; width: 80%; max-width: 320px; border: 1px solid #333; }
        
        /* Chat */
        #chat-container { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { background: #262626; padding: 12px 18px; border-radius: 18px; width: fit-content; max-width: 85%; align-self: flex-start; }
        .my-msg { background: #fff; color: #000; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 5px; }
        
        /* Pestañas (Comunidad / Privado) */
        #tabs { display: flex; background: #000; padding: 15px 20px 0 20px; gap: 20px; border-top: 1px solid #262626; }
        .tab { background: transparent; color: #666; border: none; font-size: 15px; font-weight: bold; cursor: pointer; padding-bottom: 10px; transition: 0.2s; }
        .tab.active { color: #fff; border-bottom: 2px solid #fe2c55; }
        
        /* Input */
        #input-area { padding: 20px; background: #000; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 14px; border-radius: 25px; border: 1px solid #444; background: #1a1a1a; color: white; outline: none; }
        button.btn-send { padding: 12px 25px; background: #fe2c55; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div id="login-box">
            <h2>¡Bienvenido a Sway!</h2>
            <input id="username" placeholder="Tu nombre...">
            <br><br>
            <button class="btn-send" onclick="register()" style="width: 100%;">Entrar</button>
        </div>
    </div>

    <div id="chat-container"><div id="messages"></div></div>

    <!-- Nuevos botones de modo -->
    <div id="tabs">
        <button id="tab-comunidad" class="tab active" onclick="setMode('comunidad')">Comunidad</button>
        <button id="tab-privado" class="tab" onclick="setMode('privado')">Privado 🔒</button>
    </div>

    <div id="input-area">
        <input id="input" type="text" placeholder="Mensaje a la comunidad..." autocomplete="off">
        <button class="btn-send" onclick="send()">Enviar</button>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === "https:" ? "wss://" : "ws://") + window.location.host + "/ws");
        let currentTarget = "comunidad"; // Por defecto hablamos a todos

        window.onload = () => {
            const savedName = localStorage.getItem("swayUsername");
            if (savedName) {
                setTimeout(() => {
                    ws.send(savedName);
                    document.getElementById("login-screen").style.display = "none";
                }, 500);
            }
        };

        function register() {
            const name = document.getElementById("username").value.trim();
            if (name) {
                localStorage.setItem("swayUsername", name);
                ws.send(name);
                document.getElementById("login-screen").style.display = "none";
            }
        }

        // Lógica de los botones Comunidad / Privado
        function setMode(mode) {
            if (mode === 'comunidad') {
                currentTarget = "comunidad";
                document.getElementById('tab-comunidad').classList.add('active');
                document.getElementById('tab-privado').classList.remove('active');
                document.getElementById('input').placeholder = "Mensaje a la comunidad...";
                document.getElementById('tab-privado').innerText = "Privado 🔒";
            } else {
                const user = prompt("¿A qué usuario quieres enviar el mensaje?");
                if (user && user.trim() !== "") {
                    currentTarget = user.trim();
                    document.getElementById('tab-privado').classList.add('active');
                    document.getElementById('tab-comunidad').classList.remove('active');
                    document.getElementById('input').placeholder = "Privado para " + currentTarget + "...";
                    document.getElementById('tab-privado').innerText = "Privado: " + currentTarget;
                }
            }
            document.getElementById('input').focus();
        }

        ws.onmessage = (event) => {
            const messagesDiv = document.getElementById("messages");
            const myName = localStorage.getItem("swayUsername");
            const msgData = event.data;
            
            const newMsg = document.createElement("div");
            newMsg.className = "msg";
            
            if (msgData.startsWith(myName + ": ")) {
                newMsg.classList.add("my-msg");
                newMsg.innerText = msgData.replace(myName + ": ", "");
            } else {
                newMsg.innerText = msgData;
            }
            
            messagesDiv.appendChild(newMsg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        };

        function send() {
            const input = document.getElementById("input");
            const text = input.value.trim();
            
            if (text !== "") {
                if (currentTarget === "comunidad") {
                    ws.send(text);
                } else {
                    // El código añade el @ por ti automáticamente
                    ws.send("@" + currentTarget + " " + text);
                    
                    // Como el servidor no te devuelve los privados a ti mismo, lo pintamos localmente para que lo veas
                    const messagesDiv = document.getElementById("messages");
                    const newMsg = document.createElement("div");
                    newMsg.className = "msg my-msg";
                    newMsg.innerText = "(Privado para " + currentTarget + "): " + text;
                    messagesDiv.appendChild(newMsg);
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
                input.value = "";
            }
        }

        document.getElementById("input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") send();
        });
    </script>
</body>
</html>
