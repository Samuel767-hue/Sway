<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sway</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #profile { padding: 10px; text-align: center; background: #121212; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { padding: 10px 15px; border-radius: 15px; margin: 8px; max-width: 80%; }
        .me { background: #fe2c55; color: white; margin-left: auto; }
        .them { background: #262626; }
        #bar { display: flex; padding: 15px; gap: 10px; background: #121212; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; }
    </style>
</head>
<body>
    <div id="profile">👤 <span id="name"></span></div>
    <div id="chat"></div>
    <div id="bar">
        <input id="input" placeholder="Escribe algo...">
        <button onclick="send()">Enviar</button>
    </div>

    <script>
        let user = localStorage.getItem("swayUsername") || prompt("Tu nombre:");
        localStorage.setItem("swayUsername", user);
        document.getElementById("name").innerText = user;

        let ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws");
        ws.onopen = () => ws.send(user);
        ws.onmessage = e => {
            let d = document.createElement("div");
            d.className = "msg " + (e.data.startsWith(user+": ") ? "me" : "them");
            d.innerText = e.data;
            let c = document.getElementById("chat");
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        };

        function send() {
            let i = document.getElementById("input");
            if(i.value) { ws.send(i.value); i.value = ""; }
        }
    </script>
</body>
</html>
