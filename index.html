<script>
    // CARGA DE DATOS ANTES DE CUALQUIER RENDERIZADO
    let currentMode = "comunidad";
    let chatHistories = JSON.parse(localStorage.getItem("swayAllData")) || { "comunidad": [] };
    let friends = [];
    let pendingRequests = [];

    const savedName = localStorage.getItem("swayUsername");
    if (savedName) {
        friends = JSON.parse(localStorage.getItem("swayFriends_" + savedName)) || [];
    }
</script>

<script>
    // FUNCION DE PERSISTENCIA TOTAL
    function persistirDatos() {
        const myName = localStorage.getItem("swayUsername");
        localStorage.setItem("swayAllData", JSON.stringify(chatHistories));
        if (myName) {
            localStorage.setItem("swayFriends_" + myName, JSON.stringify(friends));
        }
    }

    // WebSocket y resto de lógica
    const ws = new WebSocket((window.location.protocol === "https:" ? "wss://" : "ws://") + window.location.host + "/ws");
    
    // ... cuando llegue un mensaje ...
    ws.onmessage = (event) => {
        // ... (tu lógica de recibir mensajes) ...
        addMessageToHistory(sender, content, type);
        persistirDatos(); // <--- GUARDADO AUTOMÁTICO TRAS CADA MENSAJE
        render();
    };

    // ... cuando envíes un mensaje ...
    function send() {
        // ... (tu lógica de enviar) ...
        addMessageToHistory(currentMode, text, "me");
        persistirDatos(); // <--- GUARDADO AUTOMÁTICO TRAS CADA ENVÍO
        render();
    }
</script>
