<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sway</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;height:100vh;display:flex;flex-direction:column}
#profile{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#121212;padding:10px 25px;border-radius:25px;z-index:5}
#chat{flex:1;overflow:auto;padding:70px 20px 20px}
.msg{padding:10px 15px;border-radius:15px;margin:8px;max-width:80%}
.me{background:white;color:black;margin-left:auto}
.them{background:#262626}
#bar{display:flex;padding:15px;gap:10px}
input{flex:1;padding:12px;border-radius:20px}
</style>
</head>
<body>
<div id="profile">👤 <span id="name"></span></div>
<div id="chat"></div>
<div id="bar">
<input id="input">
<button onclick="send()">Enviar</button>
</div>

<script>
let user=localStorage.getItem("swayUsername")||"Invitado";
document.getElementById("name").innerText=user;

let ws=new WebSocket((location.protocol==="https:"?"wss://":"ws://")+location.host+"/ws");

ws.onopen=()=>ws.send(user);

ws.onmessage=e=>{
 let t=e.data;
 let c=t.startsWith(user+": ")?"me":"them";
 if(c==="me") t=t.replace(user+": ","");
 add(t,c);
};

function send(){
 let i=document.getElementById("input");
 if(i.value.trim()){
  ws.send(i.value);
  i.value="";
 }
}

function add(t,c){
 let d=document.createElement("div");
 d.className="msg "+c;
 d.innerText=t;
 document.getElementById("chat").appendChild(d);
}
</script>
</body>
</html>
