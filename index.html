<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sway Privado</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #chat-container { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .msg { background: #333; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        #input-area { padding: 20px; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 10px; border-radius: 20px; border: none; }
    </style>
</head>
<body>
    <div id="chat-container"><div id="messages"></div></div>
    <div id="input-area">
        <input id="input" placeholder="Nombre (al inicio) o @usuario mensaje...">
        <button onclick="send()">Enviar</button>
    </div>

    <script>
        const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";
        const ws = new WebSocket(protocol + window.location.host + "/ws");
        let initialized = false;

        ws.onmessage = (event) => {
            const msgDiv = document.createElement("div");
            msgDiv.className = "msg";
            msgDiv.innerText = event.data;
            document.getElementById("messages").appendChild(msgDiv);
        };

        function send() {
            const input = document.getElementById("input");
            if (!initialized) {
                ws.send(input.value);
                initialized = true;
                input.placeholder = "Escribe @usuario mensaje...";
            } else {
                ws.send(input.value);
            }
            input.value = "";
        }
    </script>
</body>
</html>
