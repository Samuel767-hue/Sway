<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sway - Live</title>
    <style>
        body { 
            margin: 0; background: #000; color: #fff; font-family: 'Helvetica', sans-serif;
            height: 100vh; display: flex; flex-direction: column; 
        }
        #chat-container { 
            flex-grow: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 10px;
        }
        .msg { 
            background: rgba(255, 255, 255, 0.1); padding: 10px 15px; 
            border-radius: 15px; width: fit-content; max-width: 80%;
            backdrop-filter: blur(5px); animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        
        #input-area { 
            padding: 20px; background: rgba(0,0,0,0.8); 
            display: flex; gap: 10px; border-top: 1px solid #333;
        }
        input { 
            flex-grow: 1; padding: 12px; border-radius: 25px; 
            border: none; background: #222; color: white; outline: none;
        }
        button { 
            padding: 10px 20px; background: #fe2c55; /* Color TikTok */
            color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="chat-container"><div id="messages"></div></div>

    <div id="input-area">
        <input id="input" type="text" placeholder="Escribe un comentario..." autocomplete="off">
        <button onclick="send()">Enviar</button>
    </div>
    
    <div id="login">
    <input id="username" placeholder="Tu nombre...">
    <button onclick="join()">Entrar</button>
</div>
    
    <script>
        const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";
        const ws = new WebSocket(protocol + window.location.host + "/ws");

        ws.onmessage = (event) => {
            const messagesDiv = document.getElementById("messages");
            const newMsg = document.createElement("div");
            newMsg.className = "msg";
            newMsg.innerText = event.data;
            messagesDiv.appendChild(newMsg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        };

        function send() {
            const input = document.getElementById("input");
            if (input.value.trim() !== "") {
                ws.send(input.value);
                input.value = "";
            }
        }

        // Permitir enviar con la tecla Enter
        document.getElementById("input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") send();
        });
    </script>
</body>
</html>
