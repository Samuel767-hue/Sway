<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sway</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Top Bar & Notificaciones */
        #top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #121212; border-bottom: 1px solid #262626; z-index: 40; }
        #bell-container { position: relative; cursor: pointer; font-size: 22px; user-select: none; }
        #bell-badge { position: absolute; top: -5px; right: -5px; background: #fe2c55; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; display: none; justify-content: center; align-items: center; font-weight: bold; }
        
        #notif-panel { position: absolute; top: 60px; right: 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; width: 260px; display: none; flex-direction: column; z-index: 50; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .notif-item { padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .notif-item:last-child { border-bottom: none; }
        .btn-acc { background: #fe2c55; color: white; border: none; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-weight: bold; }
        
        /* Login */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 100; }
        #login-box { background: #121212; padding: 40px; border-radius: 20px; text-align: center; width: 80%; max-width: 320px; border: 1px solid #333; }
        
        /* Chat Area */
        #chat-container { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 18px; border-radius: 18px; width: fit-content; max-width: 85%; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-them { background: #262626; align-self: flex-start; border-bottom-left-radius: 5px; }
        .msg-me { background: #fff; color: #000; align-self: flex-end; border-bottom-right-radius: 5px; }
        .msg-sys { background: transparent; color: #888; align-self: center; font-size: 12px; font-style: italic; }

        /* Controles Inferiores */
        #tabs { display: flex; background: #000; padding: 10px 20px 0 20px; gap: 15px; }
        .tab { background: #1a1a1a; color: #888; border: 1px solid #333; border-bottom: none; padding: 10px 20px; border-radius: 15px 15px 0 0; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .tab.active { background: #262626; color: #fff; border-color: #444; }
        
        #input-area { padding: 20px; background: #262626; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 14px; border-radius: 25px; border: none; background: #1a1a1a; color: white; outline: none; }
        button.btn-send { padding: 12px 25px; background: #fe2c55; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div id="login-box">
            <h2>Sway</h2>
            <input id="username" placeholder="Tu nombre..." autocomplete="off">
            <br><br>
            <button class="btn-send" onclick="register()" style="width: 100%;">Entrar</button>
        </div>
    </div>

    <div id="top-bar">
        <h2 style="margin: 0; font-size: 20px;">Sway</h2>
        <div id="bell-container" onclick="toggleNotifs()">
            🔔<div id="bell-badge">0</div>
            
            <div id="notif-panel">
                <div style="padding: 10px; color: #888; font-size: 12px; text-align: center;" id="notif-empty">No hay notificaciones</div>
                <div id="notif-list"></div>
            </div>
        </div>
    </div>

    <div id="chat-container"></div>

    <div id="tabs">
        <button id="tab-comunidad" class="tab active" onclick="switchTab('comunidad')">Comunidad</button>
        <button id="tab-privado" class="tab" onclick="setupPrivate()">Privado 🔒</button>
    </div>

    <div id="input-area">
        <input id="input" type="text" placeholder="Mensaje a la comunidad..." autocomplete="off">
        <button class="btn-send" onclick="send()">Enviar</button>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === "https:" ? "wss://" : "ws://") + window.location.host + "/ws");
        
        // --- ESTADO DE LA APLICACIÓN ---
        let currentMode = "comunidad"; // 'comunidad' o nombre del usuario privado
        let chatHistories = { "comunidad": [] }; // Guarda los mensajes de cada chat
        let pendingRequests = []; // Gente que quiere hablar contigo
        
        // --- INICIALIZACIÓN ---
        window.onload = () => {
            const savedName = localStorage.getItem("swayUsername");
            if (savedName) {
                setTimeout(() => {
                    ws.send(savedName);
                    document.getElementById("login-screen").style.display = "none";
                }, 500);
            }
        };

        function register() {
            const name = document.getElementById("username").value.trim();
            if (name) {
                localStorage.setItem("swayUsername", name);
                ws.send(name);
                document.getElementById("login-screen").style.display = "none";
            }
        }

        // --- RECEPCIÓN DE MENSAJES (El Cerebro) ---
        ws.onmessage = (event) => {
            const myName = localStorage.getItem("swayUsername");
            const msgData = event.data;

            // 1. Mensajes del Sistema (Errores de Go)
            if (msgData.startsWith("SISTEMA:")) {
                alert(msgData);
                return;
            }

            // 2. ¿Es un mensaje Privado?
            const privMatch = msgData.match(/^\(Privado de (.*?)\): (.*)$/);
            if (privMatch) {
                const sender = privMatch[1];
                const content = privMatch[2];

                // Petición oculta de chat
                if (content === "/SYS_REQ") {
                    if (!pendingRequests.includes(sender)) {
                        pendingRequests.push(sender);
                        updateBell();
                    }
                    return; // No lo mostramos en pantalla
                }
                
                // Confirmación oculta de que han aceptado tu petición
                if (content === "/SYS_ACC") {
                    addMessageToHistory(sender, "El usuario ha aceptado tu petición. ¡Ya podéis hablar!", "sys");
                    if (currentMode === sender) renderChat();
                    return;
                }

                // Mensaje privado normal
                addMessageToHistory(sender, content, "them");
                if (currentMode === sender) {
                    renderChat();
                } else {
                    // Si te hablan pero no estás en su pestaña, avisa visualmente
                    document.getElementById("tab-privado").innerText = "Privado 🔴";
                }
                return;
            }

            // 3. Es un mensaje de Comunidad
            let sender = "them";
            let text = msgData;
            if (msgData.startsWith(myName + ": ")) {
                sender = "me";
                text = msgData.replace(myName + ": ", "");
            }
            
            addMessageToHistory("comunidad", text, sender);
            if (currentMode === "comunidad") renderChat();
        };

        // --- LÓGICA DE DATOS ---
        function addMessageToHistory(chatName, text, type) {
            if (!chatHistories[chatName]) chatHistories[chatName] = [];
            chatHistories[chatName].push({ text, type });
        }

        function renderChat() {
            const container = document.getElementById("chat-container");
            container.innerHTML = ""; // Limpiamos la pantalla
            
            const history = chatHistories[currentMode] || [];
            
            history.forEach(msg => {
                const div = document.createElement("div");
                div.className = "msg msg-" + msg.type;
                div.innerText = msg.text;
                container.appendChild(div);
            });
            
            container.scrollTop = container.scrollHeight;
        }

        // --- LÓGICA DE UI Y PESTAÑAS ---
        function switchTab(mode) {
            currentMode = mode;
            document.getElementById("tab-comunidad").classList.toggle("active", mode === "comunidad");
            document.getElementById("tab-privado").classList.toggle("active", mode !== "comunidad");
            
            if (mode === "comunidad") {
                document.getElementById("input").placeholder = "Mensaje a la comunidad...";
                document.getElementById("tab-privado").innerText = "Privado 🔒";
            } else {
                document.getElementById("input").placeholder = "Mensaje privado para " + mode + "...";
                document.getElementById("tab-privado").innerText = mode + " 🔒";
            }
            renderChat();
            document.getElementById("input").focus();
        }

        function setupPrivate() {
            const target = prompt("¿Con quién quieres abrir un chat privado?");
            if (target && target.trim() !== "") {
                const cleanTarget = target.trim();
                // Enviamos la petición oculta
                ws.send("@" + cleanTarget + " /SYS_REQ");
                
                // Preparamos nuestro historial
                if (!chatHistories[cleanTarget]) chatHistories[cleanTarget] = [];
                addMessageToHistory(cleanTarget, "Petición enviada a " + cleanTarget + ". Esperando que acepte...", "sys");
                
                switchTab(cleanTarget);
            }
        }

        // --- NOTIFICACIONES ---
        function updateBell() {
            const badge = document.getElementById("bell-badge");
            const empty = document.getElementById("notif-empty");
            const list = document.getElementById("notif-list");
            
            badge.innerText = pendingRequests.length;
            badge.style.display = pendingRequests.length > 0 ? "flex" : "none";
            empty.style.display = pendingRequests.length > 0 ? "none" : "block";
            
            list.innerHTML = "";
            pendingRequests.forEach(req => {
                const item = document.createElement("div");
                item.className = "notif-item";
                item.innerHTML = `<span><b>${req}</b> quiere hablar</span> <button class="btn-acc" onclick="acceptRequest('${req}')">Aceptar</button>`;
                list.appendChild(item);
            });
        }

        function toggleNotifs() {
            const panel = document.getElementById("notif-panel");
            panel.style.display = panel.style.display === "flex" ? "none" : "flex";
        }

        function acceptRequest(user) {
            // Quitamos de pendientes
            pendingRequests = pendingRequests.filter(u => u !== user);
            updateBell();
            toggleNotifs(); // Cerramos panel
            
            // Enviamos confirmación oculta
            ws.send("@" + user + " /SYS_ACC");
            
            // Abrimos el chat
            switchTab(user);
        }

        // --- ENVÍO DE MENSAJES ---
        function send() {
            const input = document.getElementById("input");
            const text = input.value.trim();
            
            if (text !== "") {
                if (currentMode === "comunidad") {
                    ws.send(text); // Go lo envía a todos
                } else {
                    // Chat privado
                    ws.send("@" + currentMode + " " + text); // Go lo envía solo al target
                    addMessageToHistory(currentMode, text, "me"); // Lo guardamos en nuestro historial
                    renderChat(); // Pintamos nuestro propio mensaje
                }
                input.value = "";
            }
        }

        document.getElementById("input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") send();
        });
    </script>
</body>
</html>
