<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sway</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            margin: 0;
            background: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* Pantalla de Login estilo TikTok */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 20px;
        }
        #login-screen h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(45deg, #25f4ee, #fe2c55);
            -webkit-background-clip: text;
            background-clip: text; /* ARREGLADO: Añadida compatibilidad estándar para evitar advertencia */
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }
        .login-box {
            background: #121212;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #262626;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            width: 300px;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            box-sizing: border-box;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #fe2c55;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* Interfaz Principal */
        #top-header {
            padding: 15px;
            text-align: center;
            background: #000;
            font-weight: 700;
            border-bottom: 1px solid #121212;
            font-size: 1.1rem;
        }
        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        /* Burbujas estilo TikTok DMs */
        .msg {
            padding: 12px 16px;
            margin: 4px 0;
            max-width: 75%;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        /* Propios (Derecha - Blanco) */
        .me {
            background: #ffffff;
            color: #000000;
            margin-left: auto;
            border-radius: 22px 22px 4px 22px;
        }
        /* Otros usuarios (Izquierda - Gris Oscuro) */
        .them {
            background: #262626;
            color: #ffffff;
            margin-right: auto;
            border-radius: 22px 22px 22px 4px;
        }
        /* Mensajes automáticos */
        .system {
            background: transparent;
            color: #757575;
            margin: 10px auto;
            text-align: center;
            font-size: 0.85rem;
        }

        /* Controles Inferiores */
        #footer-controls {
            background: #000000;
            border-top: 1px solid #121212;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #tab-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
        }
        .tab-item {
            font-size: 1rem;
            font-weight: 600;
            color: #757575;
            cursor: pointer;
            padding-bottom: 6px;
            transition: 0.2s;
        }
        .tab-item.active {
            color: #ffffff;
            border-bottom: 2px solid #ffffff;
        }
        #input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        #input-field {
            flex: 1;
            padding: 14px 20px;
            border-radius: 25px;
            border: 1px solid #262626;
            background: #121212;
            color: #ffffff;
            outline: none;
            font-size: 0.95rem;
        }
        #input-field:focus {
            border-color: #fe2c55;
        }
        #send-btn {
            background: #fe2c55;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Sway</h1>
        <div class="login-box">
            <div id="g_id_onload" 
                 data-client_id="531379066398-v8r20953jk0hugfsjj1a9ij65nd3hqas.apps.googleusercontent.com" 
                 data-callback="handleGoogleLogin">
            </div>
            <div class="g_id_signin" data-type="standard" data-theme="filled_dark" data-size="large"></div>
            
            <span style="color: #555; font-size: 0.85rem;">o usa un apodo alternativo</span>
            
            <input id="nickname-input" placeholder="Nombre de usuario...">
            <button onclick="customLogin()">Entrar a Sway</button>
        </div>
    </div>

    <div id="top-header">⚡ <span id="display-username">Cargando...</span></div>
    <div id="chat-area"></div>
    
    <div id="footer-controls">
        <div id="tab-bar">
            <div class="tab-item active" id="tab-comunidad" onclick="changeTab('comunidad')">Comunidad</div>
            <div class="tab-item" id="tab-privado" onclick="changeTab('privado')">Bandeja de entrada 🔒</div>
        </div>
        <div id="input-row">
            <input id="input-field" placeholder="Añadir comentario..." onkeydown="if(event.key === 'Enter') send()">
            <button id="send-btn" onclick="send()">Enviar</button>
        </div>
    </div>

    <script>
        let currentMode = 'comunidad';
        let currentUser = localStorage.getItem("swayUsername");
        let rawMessages = [];
        
        let ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws");

        function handleGoogleLogin(response) {
            let payload = JSON.parse(atob(response.credential.split('.')[1]));
            initSession(payload.name);
        }

        function customLogin() {
            let name = document.getElementById("nickname-input").value.trim();
            if(name) initSession(name);
        }

        function initSession(username) {
            currentUser = username;
            localStorage.setItem("swayUsername", username);
            document.getElementById("display-username").innerText = username;
            document.getElementById("login-screen").style.display = 'none';
            if(ws.readyState === WebSocket.OPEN) {
                ws.send(username);
            }
        }

        if (currentUser) {
            document.getElementById("display-username").innerText = currentUser;
            document.getElementById("login-screen").style.display = 'none';
            ws.onopen = () => ws.send(currentUser);
        }

        ws.onmessage = e => {
            rawMessages.push(e.data);
            renderMessages();
        };

        // Cambiar de pestañas filtrando el contenido real en pantalla
        function changeTab(mode) {
            currentMode = mode;
            document.getElementById('tab-comunidad').classList.toggle('active', mode === 'comunidad');
            document.getElementById('tab-privado').classList.toggle('active', mode === 'privado');
            
            let input = document.getElementById("input-field");
            if (mode === 'privado') {
                input.placeholder = "Escribe @usuario mensaje...";
            } else {
                input.placeholder = "Añadir comentario...";
            }
            renderMessages();
            input.focus();
        }

        // Separación de hilos en caliente para evitar mezclar DMs con Comunidad
        function renderMessages() {
            let chatArea = document.getElementById("chat-area");
            chatArea.innerHTML = "";

            rawMessages.forEach(msgStr => {
                let isPrivate = msgStr.startsWith("(Privado de ");
                
                if (currentMode === 'comunidad' && isPrivate) return;
                if (currentMode === 'privado' && !isPrivate && !msgStr.startsWith("SISTEMA:")) return;

                let cssClass = "them";
                if (msgStr.startsWith("SISTEMA:")) {
                    cssClass = "system";
                } else if (msgStr.startsWith(currentUser + ": ") || msgStr.startsWith("(Privado de " + currentUser + "):")) {
                    cssClass = "me";
                }

                let displayTxt = msgStr;
                if (cssClass === "me" && displayTxt.startsWith(currentUser + ": ")) {
                    displayTxt = displayTxt.replace(currentUser + ": ", "");
                }

                let box = document.createElement("div");
                box.className = "msg " + cssClass;
                box.innerText = displayTxt;
                chatArea.appendChild(box);
            });
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function send() {
            let input = document.getElementById("input-field");
            let val = input.value.trim();
            if (val) {
                if (currentMode === 'privado' && !val.startsWith("@")) {
                    alert("Para enviar un mensaje privado usa el formato de mención: @usuario mensaje");
                    return;
                }
                ws.send(val);
                input.value = "";
            }
        }
    </script>
</body>
</html>
