<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sway - Live</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Pantalla de Login mejorada */
        #login-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; padding: 20px;
        }
        #login-box {
            background: #121212; padding: 40px; border-radius: 20px;
            text-align: center; width: 100%; max-width: 320px; border: 1px solid #333;
        }
        #login-box h2 { margin-bottom: 25px; font-weight: 700; }
        
        /* Estilos del chat */
        #chat-container { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { background: #262626; padding: 12px 18px; border-radius: 18px; width: fit-content; max-width: 85%; }
        
        /* Input y Botones */
        #input-area { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid #262626; }
        input { flex-grow: 1; padding: 14px; border-radius: 25px; border: 1px solid #444; background: #1a1a1a; color: white; outline: none; }
        button { padding: 12px 25px; background: #fe2c55; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #e6284d; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div id="login-box">
            <h2 style="font-size: 24px;">¡Bienvenido a Sway!</h2>
            <input id="username" placeholder="Tu nombre de usuario...">
            <br><br>
            <button onclick="register()" style="width: 100%;">Entrar al chat</button>
        </div>
    </div>

    <div id="chat-container"><div id="messages"></div></div>

    <div id="input-area">
        <input id="input" type="text" placeholder="@usuario mensaje..." autocomplete="off">
        <button onclick="send()">Enviar</button>
    </div>

    <script>
        const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";
        const ws = new WebSocket(protocol + window.location.host + "/ws");

        window.onload = () => {
            const savedName = localStorage.getItem("swayUsername");
            if (savedName) {
                setTimeout(() => {
                    ws.send(savedName);
                    document.getElementById("login-screen").style.display = "none";
                }, 500);
            }
        };

        function register() {
            const name = document.getElementById("username").value.trim();
            if (name) {
                localStorage.setItem("swayUsername", name);
                ws.send(name);
                document.getElementById("login-screen").style.display = "none";
            }
        }

        ws.onmessage = (event) => {
            const messagesDiv = document.getElementById("messages");
            const newMsg = document.createElement("div");
            newMsg.className = "msg";
            newMsg.innerText = event.data;
            messagesDiv.appendChild(newMsg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        };

        function send() {
            const input = document.getElementById("input");
            if (input.value.trim() !== "") {
                ws.send(input.value);
                input.value = "";
            }
        }

        document.getElementById("input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") send();
        });
    </script>
</body>
</html>
