<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sway</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; margin: 0; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .msg { background: #222; padding: 10px; border-radius: 10px; margin-bottom: 5px; }
        #input-area { padding: 20px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex-grow: 1; padding: 12px; border-radius: 20px; border: none; outline: none; }
    </style>
</head>
<body>
    <div id="chat"><div id="messages"></div></div>
    <div id="input-area">
        <input id="input" placeholder="Nombre (al entrar) o @usuario mensaje...">
        <button onclick="send()">Enviar</button>
    </div>
    <script>
        const ws = new WebSocket((window.location.protocol === "https:" ? "wss://" : "ws://") + window.location.host + "/ws");
        let initialized = false;
        ws.onmessage = (e) => {
            const div = document.createElement("div");
            div.className = "msg";
            div.innerText = e.data;
            document.getElementById("messages").appendChild(div);
        };
        function send() {
            const inp = document.getElementById("input");
            ws.send(inp.value);
            inp.value = "";
        }
    </script>
</body>
</html>
